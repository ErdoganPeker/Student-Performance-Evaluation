<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Performance Evaluation</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050508;color:#e2e8f0;font-family:system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.card{background:#13131f;border:1px solid #1e1e35;border-radius:16px;padding:2rem;max-width:480px;width:100%;box-shadow:0 0 40px #00d4ff11}
.badge{display:inline-block;background:#00d4ff15;border:1px solid #00d4ff33;color:#00d4ff;border-radius:999px;padding:.25rem .75rem;font-size:.75rem;margin-bottom:1rem}
h1{font-size:1.5rem;font-weight:800;margin-bottom:.4rem;background:linear-gradient(135deg,#00d4ff,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:#64748b;font-size:.875rem;margin-bottom:1.5rem}
label{display:block;font-size:.75rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.3rem}
input,select{width:100%;background:#0e0e16;border:1px solid #1e1e35;border-radius:8px;padding:.6rem .8rem;color:#e2e8f0;font-size:.875rem;margin-bottom:.9rem;outline:none}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
button{width:100%;padding:.85rem;background:#00d4ff;color:#050508;font-weight:700;font-size:.9rem;border:none;border-radius:8px;cursor:pointer;margin-top:.25rem}
button:hover{background:#00b8d9}
#result{display:none;margin-top:1.5rem;background:#0e0e16;border:1px solid #00d4ff22;border-radius:10px;padding:1.25rem;text-align:center}
.score{font-size:2.5rem;font-weight:800;color:#00d4ff;margin:.5rem 0}
.grade{font-size:1rem;color:#94a3b8}
</style>
</head>
<body>
<div class="card">
  <span class="badge">📚 Academic AI</span>
  <h1>Student Performance Evaluation</h1>
  <p class="sub">Predict performance index using lifestyle and academic metrics.</p>
  <div class="grid2">
    <div><label>Sleep Hours Per Night</label><input id="sleep" type="number" value="7" min="3" max="12" step="0.5"></div>
    <div><label>Daily Study Hours</label><input id="study" type="number" value="4" min="0" max="12" step="0.5"></div>
  </div>
  <label>Monthly Absences</label>
  <input id="absences" type="number" value="3" min="0" max="30">
  <div class="grid2">
    <div><label>Stress Level</label><select id="stress"><option value="0">Low</option><option value="1" selected>Medium</option><option value="2">High</option></select></div>
    <div><label>Internet Quality</label><select id="internet"><option value="0">Poor</option><option value="1" selected>Average</option><option value="2">Good</option></select></div>
  </div>
  <button onclick="predict()">Evaluate Performance</button>
  <div id="result">
    <p style="color:#64748b;font-size:.8rem">Performance Index</p>
    <div class="score" id="perf-val">-</div>
    <div class="grade" id="grade-val">-</div>
  </div>
</div>
<script>
async function predict(){
  const r=await fetch('/predict',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sleep_hours:+document.getElementById('sleep').value,study_hours:+document.getElementById('study').value,absences:+document.getElementById('absences').value,stress_level:+document.getElementById('stress').value,internet:+document.getElementById('internet').value})});
  const j=await r.json();
  document.getElementById('perf-val').textContent=j.performance+'/100';
  document.getElementById('grade-val').textContent='Letter Grade: '+j.grade;
  document.getElementById('result').style.display='block';
}
</script>
</body>
</html>
